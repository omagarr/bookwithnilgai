name: Deploy Frontend to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GAR_LOCATION: europe-west2
  GAR_REPOSITORY: nilgai-docker
  IMAGE_NAME: book-nilgai
  CLOUD_RUN_SERVICE: book-nilgai
  CLOUD_RUN_REGION: europe-west2

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE_URI="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}"
          docker build --platform linux/amd64 \
            -f Dockerfile.frontend \
            --build-arg NEXT_PUBLIC_API_URL=https://apib2b.nilgai.travel \
            -t ${IMAGE_URI}:prod-${{ github.sha }} \
            -t ${IMAGE_URI}:prod-latest .
          docker push ${IMAGE_URI}:prod-${{ github.sha }}
          docker push ${IMAGE_URI}:prod-latest

      - name: Deploy to Cloud Run
        run: |
          IMAGE_URI="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:prod-${{ github.sha }}"

          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image=${IMAGE_URI} \
            --region=${{ env.CLOUD_RUN_REGION }} \
            --platform=managed \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=2 \
            --timeout=60 \
            --allow-unauthenticated

      - name: Verify deployment
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} --region=${{ env.CLOUD_RUN_REGION }} --format='value(status.url)')
          echo "Service URL: ${SERVICE_URL}"
          curl -s --max-time 30 -o /dev/null -w "%{http_code}" "${SERVICE_URL}" || echo "Pending cold start"
