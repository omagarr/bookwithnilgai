name: Deploy Frontend to Cloud Run

on:
  push:
    branches: [main, staging]
  workflow_dispatch:

env:
  GAR_LOCATION: europe-west2
  GAR_REPOSITORY: nilgai-docker
  IMAGE_NAME: nilgaib2b-frontend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Set deployment environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "service=nilgaib2b-frontend-prod" >> $GITHUB_OUTPUT
            echo "tag=prod" >> $GITHUB_OUTPUT
            echo "api_url=https://apib2b.nilgai.travel" >> $GITHUB_OUTPUT
          else
            echo "service=nilgaib2b-frontend-staging" >> $GITHUB_OUTPUT
            echo "tag=staging" >> $GITHUB_OUTPUT
            echo "api_url=https://stagingapib2b.nilgai.travel" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE_URI="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}"
          docker build --platform linux/amd64 \
            -f Dockerfile.frontend \
            --build-arg NEXT_PUBLIC_API_URL=${{ steps.env.outputs.api_url }} \
            -t ${IMAGE_URI}:${{ steps.env.outputs.tag }}-${{ github.sha }} \
            -t ${IMAGE_URI}:${{ steps.env.outputs.tag }}-latest .
          docker push ${IMAGE_URI}:${{ steps.env.outputs.tag }}-${{ github.sha }}
          docker push ${IMAGE_URI}:${{ steps.env.outputs.tag }}-latest

      - name: Deploy to Cloud Run
        run: |
          IMAGE_URI="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ steps.env.outputs.tag }}-${{ github.sha }}"

          gcloud run deploy ${{ steps.env.outputs.service }} \
            --image=${IMAGE_URI} \
            --region=${{ env.GAR_LOCATION }} \
            --platform=managed \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=2 \
            --timeout=60 \
            --allow-unauthenticated

      - name: Verify deployment
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ steps.env.outputs.service }} --region=${{ env.GAR_LOCATION }} --format='value(status.url)')
          echo "Service URL: ${SERVICE_URL}"
          curl -s --max-time 30 -o /dev/null -w "%{http_code}" "${SERVICE_URL}" || echo "Pending cold start"
